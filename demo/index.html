<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>explAIn — Homework Review</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="brand-header">
    <img class="brand-logo" src="assets/logo.png" alt="explAIn" />
  </header>

  <!-- 1. Start / homework intro -->
  <section id="screen-start" class="screen">
    <div class="eyebrow" id="course"></div>
    <h1 id="topic-title"></h1>
    <p class="subtitle" id="homework-intro"></p>
    <button class="btn" id="start-btn">Start review</button>
  </section>

  <!-- 2. Voice session -->
  <section id="screen-voice" class="screen">
    <div class="voice-header">
      <div class="topic" id="voice-topic"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="orb-stage">
      <div class="orb-halo" id="orb-halo"></div>
      <div class="orb" id="orb"></div>
    </div>

    <div class="qa-slot">
      <p class="question-text" id="question-text"></p>
      <ul class="insights" id="insights"></ul>
      <div class="gen-loader" id="gen-loader"><span class="bar"></span></div>
    </div>
    <div class="progress" id="progress"></div>
  </section>

  <!-- 3. Personalized review video (teacher's AI avatar, Spanish w/ English captions) -->
  <section id="screen-video" class="screen">
    <div class="video-layout">
      <div class="video-copy">
        <div class="eyebrow" id="video-eyebrow"></div>
        <p class="video-lead" id="video-lead"></p>
        <div class="feedback" id="feedback">
          <p class="feedback-prompt" id="feedback-prompt"></p>
          <div class="feedback-btns">
            <button class="thumb" id="thumb-up" aria-label="Helpful">👍</button>
            <button class="thumb" id="thumb-down" aria-label="Not helpful">👎</button>
          </div>
        </div>
      </div>
      <div class="phone">
        <video id="review-video" playsinline preload="auto" poster="assets/video/tutor-intro-poster.jpg">
          <source type="video/mp4" />
          <track kind="subtitles" srclang="en" label="English" default />
        </video>
      </div>
    </div>
  </section>

  <!-- 4. Student end screen -->
  <section id="screen-done" class="screen">
    <div class="check">✓</div>
    <h1 id="summary-title"></h1>
    <p class="subtitle" id="summary-message"></p>
    <ul class="topics" id="summary-topics"></ul>
    <p class="footer-note" id="summary-footer"></p>
  </section>

  <!-- 5. Teacher dashboard -->
  <section id="screen-teacher" class="screen">
    <div class="eyebrow" id="teacher-eyebrow"></div>
    <h1 id="teacher-title"></h1>
    <p class="subtitle" id="teacher-subtitle"></p>
    <div class="dash-card">
      <table class="dash-table" id="teacher-table"></table>
    </div>
    <p class="dash-insight" id="teacher-insight"></p>
  </section>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
