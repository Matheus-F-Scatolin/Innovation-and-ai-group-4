<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tutor — Create Homework Review</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- 1. Start -->
  <section id="screen-start" class="screen">
    <div class="eyebrow" id="course"></div>
    <h1 id="topic-title"></h1>
    <p class="subtitle" id="intro"></p>
    <button class="btn" id="start-btn">Create homework review</button>
  </section>

  <!-- 2. Upload (staged drag-and-drop) -->
  <section id="screen-upload" class="screen">
    <div class="eyebrow" id="upload-eyebrow"></div>
    <h1 id="upload-title"></h1>
    <div class="drop-zone" id="drop-zone">
      <p class="drop-hint" id="drop-hint"></p>
      <ul class="file-list" id="file-list"></ul>
    </div>
    <div class="upload-footer">
      <p class="ready-note" id="ready-note"></p>
      <button class="btn ghost-until-ready" id="continue-btn"></button>
    </div>
  </section>

  <!-- 3. Takeaways (live mic, orb) + analysis + generating -->
  <section id="screen-voice" class="screen">
    <div class="voice-header">
      <div class="topic" id="voice-topic"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="orb-stage">
      <div class="orb-halo" id="orb-halo"></div>
      <div class="orb" id="orb"></div>
    </div>

    <div class="qa-slot">
      <p class="question-text" id="prompt-text"></p>
      <ul class="insights" id="insights"></ul>
      <div class="gen-loader" id="gen-loader"><span class="bar"></span></div>
    </div>
  </section>

  <!-- 4. Review & approve package -->
  <section id="screen-package" class="screen">
    <div class="eyebrow" id="pkg-eyebrow"></div>
    <h1 class="pkg-title" id="pkg-title"></h1>
    <p class="subtitle" id="pkg-subtitle"></p>

    <div class="pkg-grid">
      <div class="pkg-col">
        <div class="pkg-card" id="brief-card">
          <div class="card-label" id="brief-label"></div>
          <p class="card-text" id="brief-text"></p>
        </div>
        <div class="pkg-card" id="questions-card">
          <div class="card-head">
            <div class="card-label" id="questions-label"></div>
            <span class="voice-badge" id="voice-badge"></span>
          </div>
          <ul class="question-list" id="question-list"></ul>
        </div>
      </div>
      <div class="pkg-col side">
        <div class="pkg-card" id="topics-card">
          <div class="card-label" id="topics-label"></div>
          <ul class="topic-chips" id="topic-chips"></ul>
          <p class="card-note" id="topics-note"></p>
        </div>
        <div class="pkg-card avatar-card" id="avatar-card">
          <div class="card-label ok" id="avatar-label"></div>
          <p class="card-text" id="avatar-text"></p>
        </div>
      </div>
    </div>

    <button class="btn approve" id="approve-btn"></button>
  </section>

  <!-- 5. Assigned confirmation -->
  <section id="screen-assigned" class="screen">
    <div class="check">✓</div>
    <h1 id="assigned-title"></h1>
    <p class="subtitle" id="assigned-message"></p>
    <p class="footer-note" id="assigned-footer"></p>
  </section>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
